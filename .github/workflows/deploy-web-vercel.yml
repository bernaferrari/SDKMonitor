name: Deploy Web to Vercel

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: vercel-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: gradle/actions/setup-gradle@v5
      - run: chmod +x gradlew scripts/*.sh
      - name: Build and verify web distribution
        run: ./scripts/verify-web-deploy.sh --ci
      - name: Install Vercel CLI
        run: npm install -g vercel@54.20.1
      - name: Deploy production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./scripts/deploy-web-vercel.sh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy preview
        if: github.event_name == 'pull_request'
        run: ./scripts/deploy-web-vercel.sh --preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
