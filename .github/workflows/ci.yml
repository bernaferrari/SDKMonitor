name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: sdkmonitor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: KMP web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for scripts
        run: chmod +x gradlew scripts/*.sh

      - name: Run common tests and build web demo
        run: >-
          ./gradlew :shared:wasmJsBrowserTest :webApp:wasmJsBrowserDistribution
          --no-daemon --parallel --build-cache --configuration-cache

      - name: Verify web demo
        run: ./scripts/verify-web-deploy.sh --ci --skip-build
